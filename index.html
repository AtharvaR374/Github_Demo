<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text to Voice Converter</title>
    <link rel="stylesheet" href="Tts.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Text to Speech <span>Converter</span></h1>
        <p>BY ATHARVA RAHATE</p>
      </header>
      <main>
        <textarea placeholder="Write anything here..."></textarea>
        <div class="controls">
          <select id="voiceSelect"></select>
          <button id="playButton">
            <img
              src="https://webstockreview.net/images/speaker-icon-png.png"
              alt="Play"
            />
            Play Audio
          </button>
          <button id="downloadButton">Download Audio</button>
        </div>
      </main>
      <footer>
        <img src="QyUpHFYcR3-Ij1dEhc79SQ-removebg-preview.png" alt="By Atharva" />
      </footer>
    </div>
    <script src="Tts.js"></script>
  </body>
</html>
